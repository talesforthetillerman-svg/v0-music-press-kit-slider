<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tales for the Tillerman - Press Kit Slider</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #f5f5f5;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
            text-align: center;
        }
        h1 {
            color: #333;
            margin-bottom: 2rem;
        }
        .note {
            background: #fff;
            border-radius: 8px;
            padding: 1.5rem;
            margin: 2rem 0;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .links {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-top: 2rem;
            flex-wrap: wrap;
        }
        .btn {
            padding: 0.75rem 1.5rem;
            background: #0070f3;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            font-weight: 500;
            transition: background 0.2s;
        }
        .btn:hover {
            background: #0051cc;
        }
        .btn-secondary {
            background: #666;
        }
        .btn-secondary:hover {
            background: #555;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎵 Tales for the Tillerman - Press Kit Slider</h1>
        
        <div class="note">
            <p>This is a static deployment of the Press Kit Slider for GitHub Pages.</p>
            <p>The full interactive version with Next.js is available on Vercel.</p>
        </div>
        
        <div class="links">
            <a href="https://v0-music-press-kit-slider-l4tjlsepp.vercel.app" class="btn" target="_blank">
                🚀 Open Full Version (Vercel)
            </a>
            <a href="https://github.com/tales-for-the-tillerman" class="btn btn-secondary" target="_blank">
                📁 GitHub Organization
            </a>
        </div>
        
        <div style="margin-top: 3rem; color: #666; font-size: 0.9rem;">
            <p>Deployed via GitHub Pages • Press Kit for booking outreach</p>
        </div>
    </div>
</body>
</html>
